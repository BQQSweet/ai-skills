services:
  postgres:
    image: postgres:16-alpine
    container_name: chefmate-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: chefmate
      POSTGRES_USER: chefmate
      POSTGRES_PASSWORD: chefmate_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: chefmate-redis
    ports:
      - '6379:6379'

  minio:
    image: minio/minio
    container_name: chefmate-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
