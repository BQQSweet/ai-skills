<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#FF9F0A",
              "background-light": "#FAFAFA",
              "background-dark": "#121212",
              "card-light": "#FFFFFF",
            },
            fontFamily: {
              display: [
                "Plus Jakarta Sans",
                "Noto Sans SC",
                "system-ui",
                "sans-serif",
              ],
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "1.5rem",
              xl: "2rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-background-light text-slate-900 font-display;
        }
      }
      .option-selected {
        @apply border-primary bg-orange-50/50 ring-1 ring-primary/20 shadow-[0_0_15px_rgba(255,159,10,0.1)];
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="bg-background-light dark:bg-background-dark">
    <div
      class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto"
    >
      <header
        class="sticky top-0 z-30 flex items-center justify-between px-4 pt-6 pb-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md"
      >
        <button
          class="flex h-10 w-10 items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700"
        >
          <span
            class="material-symbols-outlined text-slate-600 dark:text-slate-300"
            >chevron_left</span
          >
        </button>
        <h1 class="text-lg font-bold text-slate-900 dark:text-slate-100">
          语音语言设置
        </h1>
        <div class="w-10"></div>
      </header>
      <main class="flex-1 px-6 py-4">
        <div class="mb-6">
          <h2
            class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-1"
          >
            选择识别语种
          </h2>
          <p class="text-xs text-slate-400">
            ChefMate 将使用选定的语言与您进行语音交互
          </p>
        </div>
        <div class="flex flex-col gap-3">
          <label
            class="relative flex items-center justify-between p-5 bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 cursor-pointer transition-all duration-200 option-selected"
          >
            <input
              checked=""
              class="hidden"
              name="language"
              type="radio"
              value="mandarin"
            />
            <div class="flex flex-col">
              <span class="text-base font-bold text-slate-900 dark:text-white"
                >普通话 (默认)</span
              >
              <span class="text-xs text-slate-400 mt-0.5"
                >标准语音交互，识别率最高</span
              >
            </div>
            <div
              class="flex h-6 w-6 items-center justify-center rounded-full bg-primary text-white"
            >
              <span class="material-symbols-outlined text-sm font-bold"
                >check</span
              >
            </div>
          </label>
          <label
            class="relative flex items-center justify-between p-5 bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 cursor-pointer transition-all duration-200"
          >
            <input
              class="hidden"
              name="language"
              type="radio"
              value="sichuan"
            />
            <div class="flex flex-col">
              <span
                class="text-base font-bold text-slate-700 dark:text-slate-200"
                >四川话</span
              >
              <span class="text-xs text-slate-400 mt-0.5"
                >亲切巴适，川菜大厨首选</span
              >
            </div>
            <div
              class="h-6 w-6 rounded-full border-2 border-slate-100 dark:border-slate-700"
            ></div>
          </label>
          <label
            class="relative flex items-center justify-between p-5 bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 cursor-pointer transition-all duration-200"
          >
            <input
              class="hidden"
              name="language"
              type="radio"
              value="cantonese"
            />
            <div class="flex flex-col">
              <span
                class="text-base font-bold text-slate-700 dark:text-slate-200"
                >粤语</span
              >
              <span class="text-xs text-slate-400 mt-0.5"
                >地道广味，老广煲汤助手</span
              >
            </div>
            <div
              class="h-6 w-6 rounded-full border-2 border-slate-100 dark:border-slate-700"
            ></div>
          </label>
          <label
            class="relative flex items-center justify-between p-5 bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 cursor-pointer transition-all duration-200"
          >
            <input
              class="hidden"
              name="language"
              type="radio"
              value="dongbei"
            />
            <div class="flex flex-col">
              <span
                class="text-base font-bold text-slate-700 dark:text-slate-200"
                >东北话</span
              >
              <span class="text-xs text-slate-400 mt-0.5"
                >豪爽直爽，厨房气氛担当</span
              >
            </div>
            <div
              class="h-6 w-6 rounded-full border-2 border-slate-100 dark:border-slate-700"
            ></div>
          </label>
          <label
            class="relative flex items-center justify-between p-5 bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 cursor-pointer transition-all duration-200"
          >
            <input class="hidden" name="language" type="radio" value="henan" />
            <div class="flex flex-col">
              <span
                class="text-base font-bold text-slate-700 dark:text-slate-200"
                >河南话</span
              >
              <span class="text-xs text-slate-400 mt-0.5"
                >中原气派，厚重实在的声音</span
              >
            </div>
            <div
              class="h-6 w-6 rounded-full border-2 border-slate-100 dark:border-slate-700"
            ></div>
          </label>
        </div>
        <div class="mt-8 p-5 bg-primary/5 rounded-2xl border border-primary/10">
          <div class="flex items-center gap-2 mb-2">
            <span class="material-symbols-outlined text-primary text-lg"
              >lightbulb</span
            >
            <h3 class="text-sm font-bold text-primary">小贴士</h3>
          </div>
          <p class="text-xs text-slate-500 leading-relaxed">
            选择方言后，语音助手的回复也将同步切换为对应方言。如果您在噪音环境中使用，建议优先选择“普通话”。
          </p>
        </div>
      </main>
      <footer
        class="sticky bottom-0 bg-white/90 dark:bg-background-dark/90 backdrop-blur-lg px-6 pt-4 pb-10 flex flex-col gap-3 border-t border-slate-50 dark:border-slate-800"
      >
        <button
          class="flex items-center justify-center gap-2 w-full py-4 rounded-full border-2 border-primary text-primary font-bold transition-active active:scale-95"
        >
          <span class="material-symbols-outlined text-xl">brand_awareness</span>
          语音测试
        </button>
        <button
          class="w-full py-4 rounded-full bg-primary text-white font-bold shadow-lg shadow-primary/25 transition-active active:scale-95"
        >
          确认
        </button>
      </footer>
    </div>
  </body>
</html>
