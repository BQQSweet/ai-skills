<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ChefMate Login</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff9d0a",
                        "primary-dark": "#e08a00", // Darker shade for hover/active
                        "background-light": "#FAFAFA",
                        "background-dark": "#231b0f",
                        "text-main": "#333333",
                        "text-muted": "#9CA3AF",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "PingFang SC", "Noto Sans SC", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "PingFang SC", "Noto Sans SC", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "2xl": "2.5rem", "full": "9999px" },
                    backgroundImage: {
                        'kitchen-pattern': "url(\"data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 20 Q40 5 50 20 T70 20' stroke='%23ff9d0a' stroke-width='2' fill='none' opacity='0.05'/%3E%3Ccircle cx='80' cy='60' r='5' fill='%23ff9d0a' opacity='0.05'/%3E%3Crect x='10' y='60' width='10' height='25' rx='2' fill='%23ff9d0a' opacity='0.05'/%3E%3C/svg%3E\")",
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', 'PingFang SC', 'Noto Sans SC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-display text-text-main dark:text-white transition-colors duration-300">
<!-- Background Decoration: Subtle Pattern -->
<div class="absolute inset-0 bg-kitchen-pattern z-0 pointer-events-none"></div>
<!-- Background Decoration: Gradient Blobs -->
<div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[80px] z-0"></div>
<div class="absolute bottom-[10%] -right-[10%] w-[60%] h-[60%] bg-primary/5 rounded-full blur-[80px] z-0"></div>
<main class="w-full max-w-[480px] flex-1 flex flex-col p-6 z-10 relative">
<!-- Top Branding Section -->
<div class="flex-1 flex flex-col justify-end items-center pb-10">
<!-- Logo -->
<div class="w-24 h-24 bg-gradient-to-br from-primary/20 to-primary/5 rounded-[2rem] flex items-center justify-center shadow-lg shadow-primary/10 mb-6 backdrop-blur-sm border border-primary/10">
<!-- Chef Hat Icon using Material Symbols -->
<span class="material-symbols-outlined text-primary text-[48px] drop-shadow-sm">
                    skillet
                </span>
</div>
<h1 class="text-4xl font-bold tracking-tight text-text-main dark:text-white mb-2">ChefMate</h1>
<h2 class="text-lg font-medium text-text-muted dark:text-gray-400 tracking-wide">让做饭变简单</h2>
</div>
<!-- Login Form Section -->
<div class="w-full flex flex-col gap-5">
<!-- Phone Input -->
<div class="group relative">
<div class="absolute left-5 top-1/2 -translate-y-1/2 text-primary/60 flex items-center pointer-events-none transition-colors group-focus-within:text-primary">
<span class="material-symbols-outlined text-[22px]">smartphone</span>
</div>
<input class="w-full h-16 bg-white dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl pl-14 pr-5 text-lg placeholder:text-gray-300 dark:placeholder:text-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all shadow-sm" placeholder="请输入手机号" type="tel"/>
</div>
<!-- Verification Code Input -->
<div class="group relative">
<div class="absolute left-5 top-1/2 -translate-y-1/2 text-primary/60 flex items-center pointer-events-none transition-colors group-focus-within:text-primary">
<span class="material-symbols-outlined text-[22px]">lock</span>
</div>
<input class="w-full h-16 bg-white dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl pl-14 pr-32 text-lg placeholder:text-gray-300 dark:placeholder:text-gray-600 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all shadow-sm" placeholder="请输入验证码" type="number"/>
<button class="absolute right-2 top-2 bottom-2 px-4 rounded-xl bg-primary/10 hover:bg-primary/20 text-primary text-sm font-bold transition-colors active:scale-95 flex items-center justify-center min-w-[100px]">
                    获取验证码
                </button>
</div>
<!-- Main Action Button -->
<button class="mt-4 w-full h-16 bg-primary hover:bg-primary-dark text-white text-lg font-bold rounded-full shadow-lg shadow-primary/30 transition-all active:scale-[0.98] flex items-center justify-center group relative overflow-hidden">
<span class="relative z-10 flex items-center gap-2">
                    立即登录
                    <span class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1">arrow_forward</span>
</span>
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 rounded-full"></div>
</button>
</div>
<!-- Footer Section -->
<div class="flex-1 flex flex-col justify-end items-center pt-8 pb-4 gap-8">
<!-- Third Party Login -->
<div class="flex flex-col items-center gap-4 w-full">
<div class="relative w-full flex items-center justify-center opacity-40">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-300 dark:border-gray-700"></div>
</div>
<span class="relative bg-background-light dark:bg-background-dark px-4 text-xs text-gray-400">其他登录方式</span>
</div>
<button class="w-12 h-12 rounded-full bg-[#07C160]/10 hover:bg-[#07C160]/20 flex items-center justify-center transition-colors group cursor-pointer border border-[#07C160]/20">
<!-- Wechat Icon SVG -->
<svg class="w-6 h-6 text-[#07C160] group-hover:scale-110 transition-transform" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8.6 15.6c0 .3.1.5.2.7-2.6.4-4.8-1-5.6-2.6-.9-1.9-.4-4.1 1.2-5.7 1.8-1.8 4.6-2.1 6.8-1 1.6.8 2.6 2.3 2.8 4 0 .2 0 .4-.1.5 2.1-.8 4.3-.8 6.2.1 1.7.9 2.7 2.6 2.7 4.5 0 2.2-1.3 4-3.4 4.8-.5.2-1.1.3-1.6.3-.4 0-.9 0-1.3-.1 0 .2.1.4.1.7 0 2.3-2.1 4.2-4.6 4.2-2.5 0-4.6-1.9-4.6-4.2 0-.3.1-.6.1-.8-.4.1-.9.2-1.3.2-.5 0-1-.1-1.5-.2 0-.2.1-.4.1-.7.2-1.2.9-2.2 1.9-2.9.1-.1.3-.1.4-.2.1 0 .2-.1.3-.1.1-.1.2-.2.2-.4zM7.5 7.9c-.5 0-.9.4-.9.9s.4.9.9.9.9-.4.9-.9-.4-.9-.9-.9zm4.2 0c-.5 0-.9.4-.9.9s.4.9.9.9.9-.4.9-.9-.4-.9-.9-.9zm5 7.6c-.4 0-.8.3-.8.8s.3.8.8.8.8-.3.8-.8-.3-.8-.8-.8zm3.2 0c-.4 0-.8.3-.8.8s.3.8.8.8.8-.3.8-.8-.3-.8-.8-.8z"></path>
</svg>
</button>
</div>
<!-- Terms and Policy -->
<label class="flex items-start gap-2 text-xs text-text-muted dark:text-gray-400 group cursor-pointer max-w-xs text-center leading-relaxed select-none">
<input class="mt-0.5 rounded border-gray-300 text-primary focus:ring-primary/20 w-4 h-4 bg-transparent cursor-pointer" type="checkbox"/>
<span>
                    我已阅读并同意
                    <a class="text-primary hover:underline" href="#">用户协议</a>
                    和
                    <a class="text-primary hover:underline" href="#">隐私保护指引</a>
</span>
</label>
</div>
</main>
<!-- Decorative Elements for "Kitchen" feel -->
<!-- Abstract Leaf shape in bottom left -->
<div class="absolute -bottom-10 left-0 text-primary/5 pointer-events-none rotate-45 transform">
<span class="material-symbols-outlined text-[180px]">eco</span>
</div>
</body></html>
